projectName: address-service
default:
  annotations:
    all:
      app: address-service
  labels:
    all:
      "app.kubernetes.io/part-of": address-service
  image:
    repository: "183295448290.dkr.ecr.ap-south-1.amazonaws.com/atlas/address-service"
    tag: 0.0.0
  resources:
    requests:
      memory: 6Gi
    limits:
      memory: 12Gi
  externalSecrets:
    injection:
      secrets:
        - secretName: env
          dataFrom:
            secretKey: app/address-service
          refreshInterval: 30s
          secretStoreName: aws-secret-manager

deployments:
  - fullnameOverride: address-service
    serviceAccount:
      create: true
      annotations:
        eks.amazonaws.com/role-arn: "arn:aws:iam::183295448290:role/atlas-api-server-role"
    service:
      type: NodePort
      ports:
        - port: 8000
          name: api
          ingress:
            enabled: true
            annotations:
               kubernetes.io/ingress.class: alb
               alb.ingress.kubernetes.io/group.name: atlas
               alb.ingress.kubernetes.io/target-type: instance
               alb.ingress.kubernetes.io/scheme: internet-facing
               alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80},{"HTTPS": 443}]'
               alb.ingress.kubernetes.io/ssl-redirect: '443'
               alb.ingress.kubernetes.io/healthcheck-path: /api/docs/
               alb.ingress.kubernetes.io/healthcheck-timeout-seconds: '15'
               alb.ingress.kubernetes.io/healthcheck-interval-seconds: '300'
               alb.ingress.kubernetes.io/load-balancer-attributes: idle_timeout.timeout_seconds=300
               alb.ingress.kubernetes.io/target-group-attributes: deregistration_delay.timeout_seconds=300
               alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:ap-south-1:183295448290:certificate/9935b050-cc72-465d-9afa-9975803f6a3f
            rules:
            - host: address-services.dev.kreditmind.com
              http:
                paths:
                  - path: /*
                    pathType: ImplementationSpecific
                    backend:
                      service:
                        name: address-service
                        port:
                          number: 8000
    containers:
      - fullnameOverride: address-service
        port: 8000
        imagePullPolicy: Always
        env:
          APP_MODE: "web"
          FLASK_ENV: "development"
        resources:
          requests:
            memory: 6Gi
        healthcheck:
          enabled: true
          livenessProbe:
            path: "/v1/health"
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            path: "/v1/health"
            initialDelaySeconds: 10
            periodSeconds: 20
    tolerations:
    - key: "dedicated"
      operator: "Equal"
      value: "address-service"
      effect: "NoSchedule"
    nodeSelector:
      dedicated: "address-service"

jobs:
  - name: dbmigrate-job
    serviceAccount:
      create: true
      annotations:
        eks.amazonaws.com/role-arn: "arn:aws:iam::183295448290:role/atlas-api-server-role"
    annotations:
      "helm.sh/hook": pre-upgrade,pre-install
      "helm.sh/hook-weight": "-5"
      "helm.sh/hook-delete-policy": before-hook-creation
    ttlSecondsAfterFinished: 600
    containers:
      - name: "dbmigrate-job"
        env:
          APP_MODE: "migration"
        command: ["sh", "-c"]
        args:
          - |
            echo "Starting DB migration at $(date)"
            echo "Current migration status:"
            flask db current
            echo "Running migration upgrade:"
            flask db upgrade
            echo "New migration status:"
            flask db current
            echo "Migration completed at $(date) with exit code: $?"
        resources:
          requests:
            memory: 1Gi
          limits:
            memory: 2Gi
